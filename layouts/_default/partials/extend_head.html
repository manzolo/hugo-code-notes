{{- if or (eq .Kind "taxonomy") (eq .Kind "term") (eq .Kind "page") -}}
<link rel="stylesheet" href="{{ "css/extended/custom.css" | relURL }}" integrity="" crossorigin="anonymous">
{{- end -}}
{{- if .IsHome -}}
<link rel="stylesheet" href="{{ "css/extended/home-signal.css" | relURL }}" integrity="" crossorigin="anonymous">
{{- end -}}
<script>
/* Auto-language on entry, without ever fighting a manual switch.
   On the VERY FIRST page load (any page) we mark a flag; only if that first load
   is the EN root AND the browser is Italian do we redirect to /it/. Because the
   flag is set on that first load, a later "En" click (which lands on /) never
   bounces back to Italian. */
(function () {
  try {
    if (localStorage.getItem("lang-auto")) return;
    localStorage.setItem("lang-auto", "1");
    var l = (navigator.language || navigator.userLanguage || "").toLowerCase();
    if (location.pathname === "/" && l.indexOf("it") === 0) location.replace("/it/");
  } catch (e) {}
})();
</script>
